name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kivy/python-for-android:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          pip install buildozer cython
          yes | buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: star-catcher-apk
          path: bin/*.apk
