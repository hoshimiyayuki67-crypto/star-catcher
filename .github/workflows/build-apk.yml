name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install buildozer cython
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config cmake openjdk-17-jdk libssl-dev libffi-dev wget unzip

      - name: Setup Android SDK
        run: |
          mkdir -p ~/.android ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          
          # 下载command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d android-sdk
          mkdir -p android-sdk/cmdline-tools/latest
          mv android-sdk/cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          mv android-sdk/cmdline-tools android-sdk/latest 2>/dev/null || true
          ls -la android-sdk/
          
          # 接受许可
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=~/.buildozer/android/platform/android-sdk --licenses 2>/dev/null || true
          
          echo "Android SDK setup done"

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: star-catcher-apk
          path: bin/*.apk
